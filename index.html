<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToastieOfficial</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0a0f2c, #000);
  overflow: hidden;
  color: white;
}

/* 🌌 STAR FIELD */
.stars {
  position: absolute;
  width: 200%;
  height: 200%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  animation: moveStars 80s linear infinite;
}

@keyframes moveStars {
  from { transform: translate(0,0); }
  to { transform: translate(-800px, -800px); }
}

/* ☄️ SHOOTING STARS */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 80px;
  background: linear-gradient(white, transparent);
  opacity: 0.7;
  transform: rotate(45deg);
  animation: shoot 3s linear infinite;
}

@keyframes shoot {
  0% { transform: translate(0,0) rotate(45deg); opacity: 1; }
  100% { transform: translate(-600px,600px) rotate(45deg); opacity: 0; }
}

/* 🍞 TOASTIES */
.toast {
  position: absolute;
  font-size: 28px;
  animation: float 12s linear infinite, wobble 3s ease-in-out infinite;
}

@keyframes float {
  from { transform: translateY(110vh); }
  to { transform: translateY(-10vh); }
}

@keyframes wobble {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* 🧊 GLASS CARD */
.container {
  position: relative;
  z-index: 2;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
}

/* 🔥 TITLE */
.title {
  font-size: 3rem;
  margin-bottom: 25px;
  text-shadow: 0 0 20px #00f7ff, 0 0 50px #00f7ff;
  animation: pulse 2s infinite alternate;
}

@keyframes pulse {
  from { text-shadow: 0 0 10px #00f7ff; }
  to { text-shadow: 0 0 40px #00f7ff, 0 0 80px #00f7ff; }
}

/* 🔗 BUTTONS */
.links {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.links a {
  text-decoration: none;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  transition: 0.3s;
}

/* ✨ HOVER MAGIC */
.links a:hover {
  transform: scale(1.08);
  border-color: #00f7ff;
  box-shadow: 0 0 20px #00f7ff, inset 0 0 20px #00f7ff;
}

/* 📢 ANNOUNCEMENT */
.announcement {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  border-top: 2px solid #00f7ff;
  padding: 10px;
  text-align: center;
  font-size: 1rem;
}

/* 🎵 MUSIC BUTTON */
.music-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
}

/* 🖱️ CURSOR GLOW */
.cursor {
  position: fixed;
  width: 15px;
  height: 15px;
  background: #00f7ff;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 20px #00f7ff;
}

/* 📱 RESPONSIVE */
@media (min-width: 600px) {
  .links {
    flex-direction: row;
    justify-content: center;
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- Shooting stars -->
<div class="shooting-star" style="top:10%; left:80%; animation-delay:0s;"></div>
<div class="shooting-star" style="top:30%; left:90%; animation-delay:1s;"></div>

<!-- Toasties -->
<div class="toast" style="left:10%;">🍞😎</div>
<div class="toast" style="left:40%; animation-duration:10s;">🍞😎</div>
<div class="toast" style="left:70%; animation-duration:14s;">🍞😎</div>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio.mp3">
</audio>
<div class="music-btn" onclick="toggleMusic()">🎵</div>

<!-- Main -->
<div class="container">
  <h1 class="title">🚀 ToastieOfficial</h1>

  <div class="links">
    <a href="https://discord.gg/Kgmcaf49en" target="_blank">💬 Discord</a>
    <a href="https://www.youtube.com/@ToastieOfficiall" target="_blank">▶️ YouTube</a>
    <a href="https://www.roblox.com/users/4028852307/profile" target="_blank">🎮 Roblox</a>
  </div>
</div>

<!-- Announcement -->
<div class="announcement" id="announcement"></div>

<script>
/* 📢 ANNOUNCEMENTS */
const messages = [
  "🚀 Welcome to ToastieOfficial!",
  "🎮 Roblox joins are enabled for followers!",
  "⭐ Follow on Roblox to stay connected!",
  "💬 Join our Discord community!",
  "▶️ Subscribe for epic content!",
  "🔥 New updates dropping soon!"
];

let i = 0;
setInterval(() => {
  document.getElementById("announcement").textContent = messages[i];
  i = (i + 1) % messages.length;
}, 3000);

/* 🎵 MUSIC */
function toggleMusic() {
  const music = document.getElementById("music");
  music.paused ? music.play() : music.pause();
}

/* 🖱️ CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
